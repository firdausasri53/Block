<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Stack Game</title>
<style>
    * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #2a2e4a;
    font-family: 'Arial', sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px; background: #1f2238;
  }
  .profile { display: flex; align-items: center; gap: 8px; }
  .profile img { width: 45px; height: 45px; border-radius: 12px; }
  .coin, .heart {
    background: #f0b400; padding: 6px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 14px;
  }
  .heart { background: #ff4d6d; }
  .plus { background: rgba(255,255,255,0.3); border-radius: 50%; padding: 2px 6px; }
  
  .main {
    flex: 1; display: flex; justify-content: space-between; padding: 8px;
    overflow: hidden;
  }
  .side-menu {
    display: flex; flex-direction: column; gap: 10px; width: 70px;
  }
  .menu-item {
    background: rgba(255,255,255,0.1); border-radius: 12px;
    padding: 6px; text-align: center; font-size: 10px;
  }
  .menu-item img { width: 30px; height: 30px; }
  .locked { opacity: 0.4; }
  
  .game-area {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: flex-end; padding-bottom: 20px;
  }
  canvas {
    background: #1f2238; border-radius: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .score {
    font-size: 24px; font-weight: bold; margin-bottom: 10px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  
  .play-btn {
    background: #22c55e; border: none;
    padding: 12px 40px; border-radius: 15px;
    font-size: 20px; font-weight: bold; color: white;
    margin: 10px auto; display: block;
    box-shadow: 0 4px 15px rgba(34,197,94,0.4);
  }
  .play-btn:active { transform: scale(0.95); }
  
  .navbar {
    display: flex; background: #3b82f6;
    border-top-left-radius: 25px; border-top-right-radius: 25px;
    padding: 10px; justify-content: space-around;
  }
  .nav-item img { width: 40px; height: 40px; }
  
  #gameOver {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); padding: 30px;
    border-radius: 20px; text-align: center; display: none;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="profile">
      <img src="https://i.pravatar.cc/100" alt="avatar">
      <span>P9739</span>
    </div>
    <div class="coin">🪙 <span id="coins">90</span> <span class="plus">+</span></div>
    <div class="heart">❤️ 0 <span>21:40</span> <span class="plus">+</span></div>
    <div>⚙️</div>
  </div>

  <div class="main">
    <div class="side-menu">
      <div class="menu-item">🟨<br>VOXEL PASS</div>
      <div class="menu-item locked">📋<br>MISSIONS 🔒</div>
      <div class="menu-item locked">🍵<br>GALACTIC 🔒</div>
      <div class="menu-item">👽<br>Cosmic Combo</div>
      <div class="menu-item">🩷<br>Voxy Bank</div>
    </div>

    <div class="game-area">
      <div class="score">Score: <span id="score">0</span></div>
      <canvas id="gameCanvas" width="200" height="300"></canvas>
    </div>

    <div class="side-menu">
      <div class="menu-item">📺<br>No Ads</div>
      <div class="menu-item">🎁<br>Welcome Offer</div>
      <div class="menu-item">🧰<br>Gold Offer</div>
      <div class="menu-item">🏷️<br>Endless Bounty</div>
    </div>
  </div>

  <button class="play-btn" id="playBtn">Play</button>

  <div class="navbar">
    <div class="nav-item">🏪</div>
    <div class="nav-item">🏠</div>
    <div class="nav-item">🏆</div>
  </div>

  <div id="gameOver">
    <h2>Game Over!</h2>
    <p>Score: <span id="finalScore">0</span></p>
    <button class="play-btn" onclick="restartGame()">Retry</button>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const blockSize = 40;
const cols = 5;
const rows = 7;

let stack = [];
let currentBlock = { x: 2, y: 0, width: 2 };
let direction = 1;
let speed = 2;
let score = 0;
let gameRunning = false;
let animId;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw stack
  ctx.fillStyle = '#8b5cf6';
  stack.forEach(b => {
    ctx.fillRect(b.x * blockSize, b.y * blockSize, b.width * blockSize, blockSize);
    ctx.strokeStyle = '#2a2e4a';
    ctx.strokeRect(b.x * blockSize, b.y * blockSize, b.width * blockSize, blockSize);
  });
  
  // Draw current block
  if (gameRunning) {
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(currentBlock.x * blockSize, currentBlock.y * blockSize, 
                 currentBlock.width * blockSize, blockSize);
    ctx.strokeStyle = '#2a2e4a';
    ctx.strokeRect(currentBlock.x * blockSize, currentBlock.y * blockSize, 
                   currentBlock.width * blockSize, blockSize);
  }
}

function update() {
  if (!gameRunning) return;
  
  currentBlock.x += direction * 0.1 * speed;
  
  if (currentBlock.x <= 0 || currentBlock.x + currentBlock.width >= cols) {
    direction *= -1;
  }
  
  draw();
  animId = requestAnimationFrame(update);
}

function dropBlock() {
  if (!gameRunning) return;
  
  let targetY = stack.length;
  if (targetY >= rows) {
    endGame();
    return;
  }
  
  // Check collision with block below
  if (stack.length > 0) {
    let below = stack[stack.length - 1];
    let overlapStart = Math.max(currentBlock.x, below.x);
    let overlapEnd = Math.min(currentBlock.x + currentBlock.width, below.x + below.width);
    let overlap = overlapEnd - overlapStart;
    
    if (overlap <= 0) {
      endGame();
      return;
    }
    
    currentBlock.x = overlapStart;
    currentBlock.width = overlap;
    score += Math.floor(overlap * 10);
    document.getElementById('score').textContent = score;
  }
  
  stack.push({...currentBlock, y: targetY});
  currentBlock = { x: 2, y: 0, width: currentBlock.width };
  
  // Increase speed every 3 blocks
  if (stack.length % 3 === 0) speed += 0.5;
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').style.display = 'block';
}

function restartGame() {
  stack = [];
  currentBlock = { x: 2, y: 0, width: 2 };
  score = 0;
  speed = 2;
  direction = 1;
  document.getElementById('score').textContent = 0;
  document.getElementById('gameOver').style.display = 'none';
  startGame();
}

function startGame() {
  gameRunning = true;
  update();
}

document.getElementById('playBtn').onclick = () => {
  if (!gameRunning) startGame();
};

canvas.onclick = dropBlock;
canvas.ontouchstart = (e) => {
  e.preventDefault();
  dropBlock();
};

draw();
</script>
</body>
</html>
