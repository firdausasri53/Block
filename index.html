<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Puzzle</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    min-height: 100vh;
    touch-action: none;
  }
  h1 { margin-bottom: 10px; font-size: 24px; }
  #score { font-size: 20px; margin-bottom: 10px; }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    background: #16213e;
    padding: 8px;
    border-radius: 12px;
    width: 90vw;
    max-width: 360px;
    touch-action: none;
  }

 .cell {
    width: 100%;
    aspect-ratio: 1;
    background: #0f3460;
    border-radius: 6px;
  }

 .cell.filled { background: #e94560; }

 #blocksContainer {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

 .block-piece {
    display: grid;
    gap: 4px;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
    touch-action: none;
    background: rgba(255,255,255,0.1);
  }

 .block-piece.selected {
    background: rgba(255,255,255,0.3);
    outline: 2px solid #00ff88;
  }

 .block-cell {
    width: 28px;
    height: 28px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<h1>Block Puzzle</h1>
<div id="score">Skor: 0</div>
<div id="board"></div>
<div id="blocksContainer"></div>

<script>
const boardSize = 8;
let board = [];
let score = 0;
let currentBlocks = [];
let selectedBlock = null;
let selectedBlockIndex = -1;

let dragGhost = null;
let highlightCell = null;

function initBoard() {
  board = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let i = 0; i < boardSize * boardSize; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    boardEl.appendChild(cell);
  }
  generateBlocks();
  renderBoard();
}

function generateBlocks() {
  const shapes = [
    {shape: [[1,1],[1,1]], color: '#e94560'},
    {shape: [[1,1,1],[0,1,0]], color: '#00ff88'},
    {shape: [[1,1,1,1]], color: '#00d9ff'},
    {shape: [[1,0],[1,1],[0,1]], color: '#ffa500'},
    {shape: [[1]], color: '#ff6b6b'}
  ];
  currentBlocks = [];
  for (let i = 0; i < 3; i++) {
    const random = shapes[Math.floor(Math.random() * shapes.length)];
    currentBlocks.push({...random});
  }
  renderBlocks();
}

function renderBoard() {
  const cells = document.querySelectorAll('#board.cell');
  for (let y = 0; y < boardSize; y++) {
    for (let x = 0; x < boardSize; x++) {
      const index = y * boardSize + x;
      if (!cells[index]) continue;

      if (board[y][x]) {
        cells[index].classList.add('filled');
        cells[index].style.background = board[y][x];
      } else {
        cells[index].classList.remove('filled');
        cells[index].style.background = '';
      }
    }
  }
}

function renderBlocks() {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';

  currentBlocks.forEach((block, index) => {
    const piece = document.createElement('div');
    piece.className = 'block-piece';
    if (index === selectedBlockIndex) piece.classList.add('selected');
    piece.style.gridTemplateColumns = `repeat(${block.shape[0].length}, 1fr)`;

    block.shape.forEach(row => {
      row.forEach(cell => {
        const div = document.createElement('div');
        if (cell) {
          div.className = 'block-cell';
          div.style.background = block.color;
        }
        piece.appendChild(div);
      });
    });

    piece.addEventListener('touchstart', (e) => handleTouchStart(e, index), {passive: false});
    piece.addEventListener('touchmove', (e) => handleTouchMove(e), {passive: false});
    piece.addEventListener('touchend', (e) => handleTouchEnd(e), {passive: false});

    container.appendChild(piece);
  });
}

function handleTouchStart(e, index) {
  e.preventDefault();
  selectedBlockIndex = index;
  selectedBlock = currentBlocks[index];

  dragGhost = document.createElement('div');
  dragGhost.style.position = 'fixed';
  dragGhost.style.pointerEvents = 'none';
  dragGhost.style.opacity = '0.7';
  dragGhost.style.zIndex = '100';
  dragGhost.style.display = 'grid';
  dragGhost.style.gap = '4px';
  dragGhost.style.gridTemplateColumns = `repeat(${selectedBlock.shape[0].length}, 1fr)`;

  selectedBlock.shape.forEach(row => {
    row.forEach(cell => {
      const div = document.createElement('div');
      div.style.width = '28px';
      div.style.height = '28px';
      div.style.borderRadius = '6px';
      if (cell) div.style.background = selectedBlock.color;
      dragGhost.appendChild(div);
    });
  });

  document.body.appendChild(dragGhost);
  moveGhost(e.touches[0].clientX, e.touches[0].clientY);
  renderBlocks();
}

function handleTouchMove(e) {
  e.preventDefault();
  if (!dragGhost) return;

  const x = e.touches[0].clientX;
  const y = e.touches[0].clientY;

  moveGhost(x, y);
  highlightTarget(x, y);
}

function handleTouchEnd(e) {
  e.preventDefault();
  if (!dragGhost) return;

  const x = e.changedTouches[0].clientX;
  const y = e.changedTouches[0].clientY;

  document.querySelectorAll('#board.cell').forEach(c => {
    c.style.outline = '';
  });

  if (highlightCell) {
    highlightCell.style.outline = '';
    highlightCell = null;
  }

  document.body.removeChild(dragGhost);
  dragGhost = null;

  const target = document.elementFromPoint(x, y);

  if (target && target.classList.contains('cell')) {
    const allCells = Array.from(document.querySelectorAll('#board.cell'));
    const index = allCells.indexOf(target);

    if (index!== -1) {
      const gridX = index % boardSize;
      const gridY = Math.floor(index / boardSize);

      if (canPlaceBlock(selectedBlock, gridX, gridY)) {
        placeBlock(selectedBlock, gridX, gridY);
      }
    }
  }

  selectedBlock = null;
  selectedBlockIndex = -1;
  renderBlocks();
}

function highlightTarget(x, y) {
  if (highlightCell) {
    highlightCell.style.outline = '';
  }
  const target = document.elementFromPoint(x, y);
  if (target && target.classList.contains('cell')) {
    target.style.outline = '2px solid yellow';
    highlightCell = target;
  }
}

function moveGhost(x, y) {
  if (dragGhost) {
    dragGhost.style.left = (x - dragGhost.offsetWidth / 2) + 'px';
    dragGhost.style.top = (y - dragGhost.offsetHeight / 2) + 'px';
  }
}

function canPlaceBlock(piece, x, y) {
  const matrix = piece.shape;
  for (let i = 0; i < matrix.length; i++) {
    for (let j = 0; j < matrix[0].length; j++) {
      if (matrix[i][j]) {
        const nx = x + j;
        const ny = y + i;
        if (nx < 0 || nx >= boardSize || ny < 0 || ny >= boardSize) return false;
        if (board[ny][nx]) return false;
      }
    }
  }
  return true;
}

function placeBlock(piece, x, y) {
  const matrix = piece.shape;
  for (let i = 0; i < matrix.length; i++) {
    for (let j = 0; j < matrix[0].length; j++) {
      if (matrix[i][j]) {
        board[y + i][x + j] = piece.color;
      }
    }
  }

  currentBlocks.splice(selectedBlockIndex, 1);
  score += 10;
  document.getElementById('score').textContent = 'Skor: ' + score;

  checkLines();
  renderBoard();

  if (currentBlocks.length === 0) {
    generateBlocks();
  }
}

function checkLines() {
  let linesCleared = 0;
  for (let y = boardSize - 1; y >= 0; y--) {
    if (board[y].every(cell => cell!== 0)) {
      board.splice(y, 1);
      board.unshift(Array(boardSize).fill(0));
      linesCleared++;
      y++;
    }
  }
  if (linesCleared > 0) {
    score += linesCleared * 100;
    document.getElementById('score').textContent = 'Skor: ' + score;
  }
}

initBoard();
</script>

</body>
</html>
