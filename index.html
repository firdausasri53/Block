<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Puzzle</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #1a1a1a;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  #score {
    font-size: 24px;
    margin-bottom: 15px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
    background: #333;
    padding: 5px;
    border-radius: 8px;
    width: 90vw;
    max-width: 400px;
  }

 .cell {
    width: 100%;
    aspect-ratio: 1;
    background: #222;
    border-radius: 4px;
  }

 .cell.highlight {
    background: rgba(255, 255, 0, 0.5);
  }

  #blocks {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

 .block {
    display: grid;
    gap: 2px;
    touch-action: none;
  }

 .block-cell {
    width: 25px;
    height: 25px;
    border-radius: 3px;
  }

 .block.dragging {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div id="score">Skor: 0</div>
<div id="board"></div>
<div id="blocks"></div>

<script>
const boardSize = 8;
let board = Array.from({length: boardSize}, () => Array(boardSize).fill(0));
let score = 0;
let selectedBlock = null;
let selectedBlockIndex = null;
let currentBlocks = [];

const shapes = [
  {shape: [[1,1],[1,1]], color: '#ff5252'},
  {shape: [[1,1,1],[0,0,1]], color: '#4caf50'},
  {shape: [[1,1,1,1]], color: '#2196f3'},
  {shape: [[1,1,0],[0,1,1]], color: '#ff9800'},
  {shape: [[1],[1],[1]], color: '#9c27b0'},
  {shape: [[1]], color: '#00bcd4'}
];

function init() {
  renderBoard();
  generateBlocks();
  renderBlocks();
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (board[r][c]!== 0) {
        cell.style.background = board[r][c];
      }
      boardEl.appendChild(cell);
    }
  }
}

function generateBlocks() {
  currentBlocks = [];
  for (let i = 0; i < 3; i++) {
    const random = shapes[Math.floor(Math.random() * shapes.length)];
    currentBlocks.push(JSON.parse(JSON.stringify(random)));
  }
}

function renderBlocks() {
  const blocksEl = document.getElementById('blocks');
  blocksEl.innerHTML = '';

  currentBlocks.forEach((block, idx) => {
    const blockEl = document.createElement('div');
    blockEl.className = 'block';
    blockEl.style.gridTemplateColumns = `repeat(${block.shape[0].length}, 1fr)`;

    block.shape.forEach(row => {
      row.forEach(cell => {
        const cellEl = document.createElement('div');
        cellEl.className = 'block-cell';
        cellEl.style.background = cell? block.color : 'transparent';
        blockEl.appendChild(cellEl);
      });
    });

    blockEl.addEventListener('touchstart', e => handleTouchStart(e, block, idx));
    blockEl.addEventListener('touchmove', handleTouchMove);
    blockEl.addEventListener('touchend', handleTouchEnd);

    blocksEl.appendChild(blockEl);
  });
}

function handleTouchStart(e, block, idx) {
  selectedBlock = block;
  selectedBlockIndex = idx;
  const clone = e.target.cloneNode(true);
  clone.classList.add('dragging');
  document.body.appendChild(clone);
  selectedBlock.el = clone;
}

function handleTouchMove(e) {
  if (!selectedBlock) return;
  e.preventDefault();

  const touch = e.touches[0];
  const el = selectedBlock.el;
  el.style.left = touch.clientX - el.offsetWidth / 2 + 'px';
  el.style.top = touch.clientY - el.offsetHeight / 2 + 'px';

  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));

  if (target && target.classList.contains('cell')) {
    const allCells = Array.from(document.querySelectorAll('#board.cell'));
    const index = allCells.indexOf(target);
    if (index!== -1 && canPlaceShape(index, selectedBlock.shape)) {
      const cells = getShapeCells(index, selectedBlock.shape);
      cells.forEach(i => {
        if (allCells[i]) allCells[i].classList.add('highlight');
      });
    }
  }
}

function handleTouchEnd(e) {
  if (!selectedBlock) return;

  e.preventDefault();
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);

  if (target && target.classList.contains('cell')) {
    const allCells = Array.from(document.querySelectorAll('#board.cell'));
    const index = allCells.indexOf(target);

    if (index!== -1 && canPlaceShape(index, selectedBlock.shape)) {
      placeBlock(selectedBlock.shape, index);
    }
  }

  selectedBlock = null;
  selectedBlockIndex = null;
  document.querySelectorAll('.block.dragging').forEach(el => el.remove());
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
}

function getShapeCells(startIndex, shape) {
  const cells = [];
  const startRow = Math.floor(startIndex / boardSize);
  const startCol = startIndex % boardSize;

  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const row = startRow + r;
        const col = startCol + c;
        if (row >= boardSize || col >= boardSize) return [];
        cells.push(row * boardSize + col);
      }
    }
  }
  return cells;
}

function canPlaceShape(startIndex, shape) {
  const cells = getShapeCells(startIndex, shape);
  if (cells.length === 0) return false;
  return cells.every(i => board[Math.floor(i / boardSize)][i % boardSize] === 0);
}

function placeBlock(shape, startIndex) {
  const cells = getShapeCells(startIndex, shape);

  cells.forEach(i => {
    const row = Math.floor(i / boardSize);
    const col = i % boardSize;
    board[row][col] = shape.color;
  });

  currentBlocks.splice(selectedBlockIndex, 1);
  score += cells.length;
  document.getElementById('score').textContent = 'Skor: ' + score;

  checkLines();
  renderBoard();
  renderBlocks();

  if (currentBlocks.length === 0) {
    generateBlocks();
    renderBlocks();
  }
}

function checkLines() {
  // Cek baris
  for (let r = 0; r < boardSize; r++) {
    if (board[r].every(cell => cell!== 0)) {
      board[r] = Array(boardSize).fill(0);
      score += 100;
    }
  }

  // Cek kolom
  for (let c = 0; c < boardSize; c++) {
    let full = true;
    for (let r = 0; r < boardSize; r++) {
      if (board[r][c] === 0) full = false;
    }
    if (full) {
      for (let r = 0; r < boardSize; r++) {
        board[r][c] = 0;
      }
      score += 100;
    }
  }

  document.getElementById('score').textContent = 'Skor: ' + score;
}

init();
</script>

</body>
</html>
