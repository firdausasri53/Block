<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Blast Web</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #3b4a7a;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

 .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
  }

 .score {
    font-size: 32px;
    font-weight: bold;
  }

 .highscore {
    color: #fbbf24;
    font-size: 18px;
    font-weight: bold;
  }

 .gear {
    font-size: 28px;
    cursor: pointer;
  }

 .game-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

 .board {
    background: #1e293b;
    padding: 8px;
    border-radius: 15px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    width: 95vw;
    max-width: 360px;
    aspect-ratio: 1;
  }

 .cell {
    background: #0f172a;
    border-radius: 6px;
  }

 .cell.filled {
    border-radius: 8px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
  }

 .blocks-container {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: 25px;
    width: 100%;
    max-width: 360px;
    height: 120px;
  }

 .block-piece {
    display: grid;
    gap: 4px;
    cursor: grab;
    touch-action: none;
  }

 .block-piece:active {
    cursor: grabbing;
    opacity: 0.8;
  }

 .block-cell {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
  }

 .ghost {
    opacity: 0.4;
  }

 .game-over {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(15, 23, 42, 0.95);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    display: none;
  }

 .game-over h2 {
    font-size: 28px;
    margin-bottom: 15px;
    color: #f87171;
  }

 .btn {
    background: #22c55e;
    border: none;
    padding: 12px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    margin-top: 15px;
  }

 .colors {
    --c1: #3b82f6;
    --c2: #f97316;
    --c3: #22c55e;
    --c4: #a855f7;
    --c5: #eab308;
    --c6: #06b6d4;
    --c7: #ec4899;
  }
</style>
</head>
<body class="colors">

  <div class="header">
    <div class="highscore">👑 <span id="highscore">0</span></div>
    <div class="score" id="score">0</div>
    <div class="gear" onclick="alert('Setting belum ada bro')">⚙️</div>
  </div>

  <div class="game-container">
    <div class="board" id="board"></div>

    <div class="blocks-container" id="blocksContainer"></div>
  </div>

  <div class="game-over" id="gameOver">
    <h2>Game Over!</h2>
    <p>Skor: <span id="finalScore">0</span></p>
    <button class="btn" onclick="restartGame()">Main Lagi</button>
  </div>

<script>
const boardSize = 8;
const colors = ['#3b82f6', '#f97316', '#22c55e', '#a855f7', '#eab308', '#06b6d4', '#ec4899'];

let board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
let score = 0;
let highscore = localStorage.getItem('blockblast_highscore') || 0;
let currentBlocks = [];
let selectedBlock = null;
let selectedBlockIndex = -1;

document.getElementById('highscore').textContent = highscore;

// Bentuk blok yang tersedia
const blockShapes = [
  [[1]], // 1x1
  [[1,1]], // 2x1
  [[1],[1]], // 1x2
  [[1,1,1]], // 3x1
  [[1],[1],[1]], // 1x3
  [[1,1],[1,1]], // 2x2
  [[1,1,1,1]], // 4x1
  [[1,1,1],[1,0,0]], // L
  [[1,1,1],[0,0,1]], // L mirror
  [[1,1,0],[0,1,1]], // Z
  [[0,1,1],[1,1,0]], // Z mirror
  [[1,1,1],[0,1,0]], // T
];

// Buat board
function createBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let i = 0; i < boardSize * boardSize; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    boardEl.appendChild(cell);
  }
}

// Generate 3 blok random
function generateBlocks() {
  currentBlocks = [];
  for (let i = 0; i < 3; i++) {
    const shape = blockShapes[Math.floor(Math.random() * blockShapes.length)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    currentBlocks.push({ shape, color });
  }
  renderBlocks();
}

// Render blok di bawah
function renderBlocks() {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';

  currentBlocks.forEach((block, index) => {
    const piece = document.createElement('div');
    piece.className = 'block-piece';
    piece.style.gridTemplateColumns = `repeat(${block.shape[0].length}, 1fr)`;
    piece.draggable = true;

    block.shape.forEach(row => {
      row.forEach(cell => {
        const div = document.createElement('div');
        if (cell) {
          div.className = 'block-cell';
          div.style.background = block.color;
        }
        piece.appendChild(div);
      });
    });

    piece.addEventListener('touchstart', (e) => selectBlock(e, index));
    piece.addEventListener('mousedown', (e) => selectBlock(e, index));
    container.appendChild(piece);
  });
}

// Pilih blok
function selectBlock(e, index) {
  selectedBlock = currentBlocks[index];
  selectedBlockIndex = index;
  e.preventDefault();
}

// Render board ke layar
function renderBoard() {
  const cells = document.querySelectorAll('#board.cell');
  for (let y = 0; y < boardSize; y++) {
    for (let x = 0; x < boardSize; x++) {
      const cell = cells[y * boardSize + x];
      if (board[y][x]) {
        cell.className = 'cell filled';
        cell.style.background = board[y][x];
      } else {
        cell.className = 'cell';
        cell.style.background = '';
      }
    }
  }
}

// Cek bisa taruh blok di posisi x,y
function canPlaceBlock(block, startX, startY) {
  for (let y = 0; y < block.shape.length; y++) {
    for (let x = 0; x < block.shape[0].length; x++) {
      if (block.shape[y][x]) {
        let bx = startX + x;
        let by = startY + y;
        if (bx < 0 || bx >= boardSize || by < 0 || by >= boardSize || board[by][bx]) {
          return false;
        }
      }
    }
  }
  return true;
}

// Taruh blok ke board
function placeBlock(block, startX, startY) {
  for (let y = 0; y < block.shape.length; y++) {
    for (let x = 0; x < block.shape[0].length; x++) {
      if (block.shape[y][x]) {
        board[startY + y][startX + x] = block.color;
        score += 10;
      }
    }
  }
  checkLines();
  currentBlocks.splice(selectedBlockIndex, 1);
  selectedBlock = null;
  selectedBlockIndex = -1;

  if (currentBlocks.length === 0) generateBlocks();

  updateScore();
  renderBoard();
  renderBlocks();

  if (!canPlaceAnyBlock()) gameOver();
}

// Cek baris/kolom penuh
function checkLines() {
  let linesCleared = 0;

  // Cek baris
  for (let y = 0; y < boardSize; y++) {
    if (board[y].every(cell => cell!== 0)) {
      board[y] = Array(boardSize).fill(0);
      linesCleared++;
    }
  }

  // Cek kolom
  for (let x = 0; x < boardSize; x++) {
    let full = true;
    for (let y = 0; y < boardSize; y++) {
      if (board[y][x] === 0) full = false;
    }
    if (full) {
      for (let y = 0; y < boardSize; y++) board[y][x] = 0;
      linesCleared++;
    }
  }

  score += linesCleared * 100;
}

// Cek masih bisa taruh blok atau nggak
function canPlaceAnyBlock() {
  for (let block of currentBlocks) {
    for (let y = 0; y < boardSize; y++) {
      for (let x = 0; x < boardSize; x++) {
        if (canPlaceBlock(block, x, y)) return true;
      }
    }
  }
  return false;
}

function updateScore() {
  document.getElementById('score').textContent = score;
  if (score > highscore) {
    highscore = score;
    localStorage.setItem('blockblast_highscore', highscore);
    document.getElementById('highscore').textContent = highscore;
  }
}

function gameOver() {
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').style.display = 'block';
}

function restartGame() {
  board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
  score = 0;
  updateScore();
  document.getElementById('gameOver').style.display = 'none';
  generateBlocks();
  renderBoard();
}

// Touch & Mouse event buat taruh blok
const boardEl = document.getElementById('board');
boardEl.addEventListener('click', handleBoardClick);
boardEl.addEventListener('touchend', handleBoardClick);

function handleBoardClick(e) {
  if (!selectedBlock) return;

  const rect = boardEl.getBoundingClientRect();
  const cellSize = rect.width / boardSize;
  const x = Math.floor((e.clientX || e.changedTouches[0].clientX - rect.left) / cellSize);
  const y = Math.floor((e.clientY || e.changedTouches[0].clientY - rect.top) / cellSize);

  if (canPlaceBlock(selectedBlock, x, y)) {
    placeBlock(selectedBlock, x, y);
  }
}

// Init game
createBoard();
generateBlocks();
renderBoard();
</script>
</body>
</html>
