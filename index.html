<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Stack</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
    font-family: 'Arial', sans-serif;
    color: white;
    height: 100vh;
    overflow: hidden;
  }

  /* LAYAR 1: MENU UTAMA */
  #mainMenu {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
  }
  
  #mainMenu h1 {
    font-size: 48px;
    margin-bottom: 10px;
    color: #a5b4fc;
    text-shadow: 0 0 20px #6366f1;
  }
  
  #mainMenu p {
    font-size: 16px;
    opacity: 0.7;
    margin-bottom: 40px;
  }
  
  .menu-btn {
    background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
    border: none;
    padding: 18px 60px;
    border-radius: 15px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
    transition: 0.1s;
  }
  
  .menu-btn:active {
    transform: scale(0.95);
  }

  /* LAYAR 2: PILIH LEVEL */
  #levelScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
  }
  
  #levelScreen h2 {
    font-size: 32px;
    margin-bottom: 30px;
    color: #c7d2fe;
  }
  
  .level-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    width: 100%;
    max-width: 320px;
  }
  
  .level-card {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(99, 102, 241, 0.5);
    border-radius: 15px;
    padding: 25px 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .level-card:active {
    transform: scale(0.95);
    background: rgba(99, 102, 241, 0.3);
  }
  
  .level-card .level-num {
    font-size: 28px;
    font-weight: bold;
    color: #a5b4fc;
  }
  
  .level-card .level-diff {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 5px;
  }
  
  .back-btn {
    margin-top: 30px;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.3);
    color: white;
    padding: 12px 40px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
  }

  /* LAYAR 3: GAME */
  #gameScreen {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    background: rgba(0,0,0,0.3);
  }
  
  .stat {
    background: rgba(0,0,0,0.4);
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
  }
  
  .stat.coin { background: #f0b400; color: #1e1b4b; }
  .stat.heart { background: #ff4d6d; }
  
  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  
  canvas {
    background: rgba(0,0,0,0.4);
    border-radius: 15px;
    max-width: 90vw;
    max-height: 55vh;
  }
  
  .game-info {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
  }
  
  .game-info span {
    color: #a5b4fc;
  }
  
  .game-controls {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: rgba(0,0,0,0.3);
  }
  
  .ctrl-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  
  .ctrl-btn.back {
    background: rgba(255,255,255,0.1);
    color: white;
  }
  
  .ctrl-btn.retry {
    background: #22c55e;
    color: white;
  }

  /* POPUP GAME OVER */
  #gameOver {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(15, 23, 42, 0.95);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    border: 2px solid #6366f1;
    width: 85%;
    max-width: 300px;
  }
  
  #gameOver h2 {
    font-size: 28px;
    margin-bottom: 10px;
    color: #f87171;
  }
  
  #gameOver p {
    font-size: 18px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

  <!-- LAYAR 1: MENU UTAMA -->
  <div id="mainMenu">
    <h1>STACK BLOCK</h1>
    <p>Susun blok setinggi mungkin!</p>
    <button class="menu-btn" onclick="showLevelScreen()">PLAY</button>
  </div>

  <!-- LAYAR 2: PILIH LEVEL -->
  <div id="levelScreen">
    <h2>Pilih Level</h2>
    <div class="level-grid">
      <div class="level-card" onclick="startGame(43, 2)">
        <div class="level-num">43</div>
        <div class="level-diff">Mudah</div>
      </div>
      <div class="level-card" onclick="startGame(44, 3)">
        <div class="level-num">44</div>
        <div class="level-diff">Sedang</div>
      </div>
      <div class="level-card" onclick="startGame(45, 4)">
        <div class="level-num">45</div>
        <div class="level-diff">Sulit</div>
      </div>
      <div class="level-card" onclick="startGame(46, 5)">
        <div class="level-num">46</div>
        <div class="level-diff">Gila</div>
      </div>
    </div>
    <button class="back-btn" onclick="backToMenu()">Kembali</button>
  </div>

  <!-- LAYAR 3: GAME -->
  <div id="gameScreen">
    <div class="topbar">
      <div class="stat coin">🪙 <span id="coins">90</span></div>
      <div class="stat heart">❤️ <span id="lives">3</span></div>
    </div>
    
    <div class="game-area">
      <div class="game-info">
        Level <span id="currentLevel">43</span> | Skor: <span id="score">0</span>
      </div>
      <canvas id="gameCanvas" width="200" height="300"></canvas>
    </div>
    
    <div class="game-controls">
      <button class="ctrl-btn back" onclick="quitToMenu()">Menu</button>
      <button class="ctrl-btn retry" onclick="restartGame()">Ulang</button>
    </div>
  </div>

  <!-- POPUP GAME OVER -->
  <div id="gameOver">
    <h2>Game Over!</h2>
    <p>Skor: <span id="finalScore">0</span></p>
    <button class="menu-btn" onclick="restartGame()">Main Lagi</button>
    <button class="back-btn" onclick="quitToMenu()">Menu</button>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const blockSize = 40;
const cols = 5;

let stack = [], currentBlock = { x: 2, y: 0, width: 2 };
let direction = 1, speed = 2, score = 0, level = 43, lives = 3;
let gameRunning = false, animId;

// NAVIGASI LAYAR
function showLevelScreen() {
  document.getElementById('mainMenu').style.display = 'none';
  document.getElementById('levelScreen').style.display = 'flex';
}

function backToMenu() {
  document.getElementById('levelScreen').style.display = 'none';
  document.getElementById('mainMenu').style.display = 'flex';
}

function quitToMenu() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('levelScreen').style.display = 'flex';
}

// GAME LOGIC
function startGame(lvl, spd) {
  level = lvl;
  speed = spd;
  score = 0;
  lives = 3;
  
  document.getElementById('levelScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  
  document.getElementById('currentLevel').textContent = level;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  
  restartGame();
}

function restartGame() {
  stack = [];
  currentBlock = { x: 2, y: 0, width: 2 };
  direction = 1;
  score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('lives').textContent = lives;
  document.getElementById('gameOver').style.display = 'none';
  gameRunning = true;
  update();
}

function update() {
  if (!gameRunning) return;
  
  currentBlock.x += direction * 0.1 * speed;
  if (currentBlock.x <= 0 || currentBlock.x + currentBlock.width >= cols) direction *= -1;
  
  draw();
  animId = requestAnimationFrame(update);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw stack
  ctx.fillStyle = '#8b5cf6';
  stack.forEach(b => {
    ctx.fillRect(b.x * blockSize, b.y * blockSize, b.width * blockSize, blockSize);
  });
  
  // Draw moving block
  if (gameRunning) {
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(currentBlock.x * blockSize, currentBlock.y * blockSize, 
                 currentBlock.width * blockSize, blockSize);
  }
}

function dropBlock() {
  if (!gameRunning) return;
  
  if (stack.length > 0) {
    let below = stack[stack.length - 1];
    let overlap = Math.min(currentBlock.x + currentBlock.width, below.x + below.width) - 
                  Math.max(currentBlock.x, below.x);
    
    if (overlap <= 0) {
      loseLife();
      return;
    }
    
    currentBlock.x = Math.max(currentBlock.x, below.x);
    currentBlock.width = overlap;
    score += Math.floor(overlap * 10);
    document.getElementById('score').textContent = score;
  }
  
  stack.push({...currentBlock, y: stack.length});
  currentBlock = { x: 2, y: 0, width: Math.max(1, currentBlock.width) };
}

function loseLife() {
  lives--;
  document.getElementById('lives').textContent = lives;
  
  if (lives <= 0) {
    endGame();
  } else {
    stack.pop();
    currentBlock = { x: 2, y: 0, width: 2 };
  }
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').style.display = 'block';
}

// EVENT LISTENER
canvas.addEventListener('click', dropBlock);
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  dropBlock();
});

// Draw sekali biar canvas gak kosong
draw();
</script>
</body>
</html>
